<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1200px;
  height: 630px;
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #1565C0 0%, #2196F3 50%, #42A5F5 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Decorative circles */
.circle1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  top: -180px;
  right: -100px;
}
.circle2 {
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  bottom: -120px;
  left: -80px;
}
.circle3 {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  top: 60%;
  right: 15%;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 80px;
  padding: 0 80px;
  width: 100%;
}

.text-side {
  flex: 1;
  color: white;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}
.logo span { opacity: 0.9; }

.title {
  font-size: 52px;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 22px;
  font-weight: 400;
  opacity: 0.9;
  line-height: 1.5;
  margin-bottom: 32px;
}

.badges {
  display: flex;
  gap: 12px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 8px 18px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  color: white;
}

.phone-side {
  flex-shrink: 0;
  position: relative;
}

.phone-frame {
  width: 240px;
  border-radius: 32px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.15);
  background: #000;
  padding: 8px;
}
.phone-frame img {
  width: 100%;
  border-radius: 24px;
  display: block;
}
</style>
</head>
<body>
<div class="circle1"></div>
<div class="circle2"></div>
<div class="circle3"></div>

<div class="content">
  <div class="text-side">
    <div class="logo">Fitter <span>AI</span></div>
    <div class="title">운동 기록,<br>이제 AI가 알아서.</div>
    <div class="subtitle">크로스핏 & 하이록스를 위한<br>스마트 운동 기록 앱</div>
    <div class="badges">
      <div class="badge">📸 AI 자동 기록</div>
      <div class="badge">🏋️ 1RM 추적</div>
      <div class="badge">👥 리더보드</div>
    </div>
  </div>
  <div class="phone-side">
    <div class="phone-frame">
      <img src="../screenshots/01_home.png" alt="Fitter AI">
    </div>
  </div>
</div>
</body>
</html>
